<!DOCTYPE html>
<html>

<head>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

$(function(){

$("#btn").click(function(){

$("h1").css("color","red");

});

});

</script>

</head>

<body>

<h1>

jQuery CSS Example

</h1>

<button id="btn">

Change Color

</button>

</body>

</html>
