<!DOCTYPE html>
<html>
<head>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

$(document).ready(function(){

$("#showBtn").click(function(){

$("p").show();

});

$("#hideBtn").click(function(){

$("p").hide();

});

});

</script>

</head>

<body>

<p>Hello World</p>

<button id="hideBtn">Hide</button>

<button id="showBtn">Show</button>

</body>

</html>
